<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오류 - 식단 소모 계산기</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
      <span class="navbar-brand fw-bold">
        <span class="me-2">🥗</span>식단 소모 계산기
      </span>
    </div>
  </nav>

  <div class="container py-5 text-center" style="max-width: 480px;">
    <div class="display-1 mb-3">😢</div>
    <h2 class="fs-4 fw-bold mb-2">분석에 실패했습니다</h2>
    <p class="text-muted mb-4">{{ message }}</p>
    {% if detail %}
    <p class="text-danger small mb-4">{{ detail }}</p>
    {% endif %}
    <a href="/" class="btn btn-success px-5">다시 시도하기</a>
  </div>

</body>
</html>
